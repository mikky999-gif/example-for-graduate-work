databaseChangeLog:
  # Таблица пользователей
  - changeSet:
      id: create-table-users
      author: developer
      preConditions:
        onFail: MARK_RAN  # Если условие не выполнено (таблица ЕСТЬ), пометить этот шаг как успешно пройденный
        not:
          tableExists:
            schemaName: public
            tableName: users
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: VARCHAR(16)
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: image_url
                  type: VARCHAR(1024)

  # Таблица объявлений (аналогично добавляем precondition)
  - changeSet:
      id: create-table-ads
      author: developer
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            schemaName: public
            tableName: ads
      changes:
        - createTable:
            tableName: ads
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: price
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: image_url
                  type: VARCHAR(1024)
              - column:
                  name: author_id
                  type: BIGINT
                  constraints:
                    nullable: false

  # Таблица комментариев
  - changeSet:
      id: create-table-comments
      author: developer
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            schemaName: public
            tableName: comments
      changes:
        - createTable:
            tableName: comments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: author_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: ad_id
                  type: BIGINT
                  constraints:
                    nullable: false